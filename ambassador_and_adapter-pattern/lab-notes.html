# Single-Node Patterns Lab 
##(Ambassador & Adapter)

---

## 1. Why Are We Doing This?

Today, we will see how we can extend and modify applications **without changing their core code**.

In real systems:

* We often cannot modify legacy services
* We still need observability, routing, security, etc.

So instead of touching the app, we **wrap it with helper services**.

**single-node patterns** exist on a single node.

Later we will see more patterns deployed on multiple nodes.

---

## 2. What Is a Single-Node Pattern?

A single-node pattern means:

> Multiple cooperating processes run together on the same machine and act as one logical unit.

Instead of building one big application, we compose smaller ones.

Two patterns we will focus on:

* Ambassador Pattern → controls communication *out of* the app
* Adapter Pattern → transforms the app’s interface

---

# PART A — AMBASSADOR PATTERN

## 3. Conceptual Idea

Think of the ambassador as a **smart proxy**.

The application does NOT talk directly to external services.

Instead:

```
App → Ambassador → External Services
```

The ambassador can:

* route traffic
* split traffic (e.g. canary deployments)
* add retries/timeouts
* hide complexity

[Canary deployments](https://martinfowler.com/bliki/CanaryRelease.html)

---

## 4. What We Will Build

We will implement:

* A simple backend service
* A second backend (canary)
* An ambassador (Python proxy)

The ambassador will:

* forward requests
* randomly split traffic (e.g. 80/20)
* expose `/stats`

---

## 5. Step 1 — Backend Service

Create `backend.py`:

```python
from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer
import json

class Handler(BaseHTTPRequestHandler):
    def do_GET(self):
        payload = {"service": "stable"}
        self.send_response(200)
        self.send_header("Content-Type", "application/json")
        self.end_headers()
        self.wfile.write(json.dumps(payload).encode())

server = ThreadingHTTPServer(("0.0.0.0", 8001), Handler)
server.serve_forever()
```

Duplicate it and change `"stable"` → `"canary"`.

---

## 6. Step 2 a — Ambassador (Proxy)
Create `proxy.py`:

```python
from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer
import requests, random, json

STABLE = "http://backend:8001"
CANARY = "http://canary:8002"

stats = {"stable": 0, "canary": 0}
```

---

## 6. Step b — Ambassador (Proxy) - Contd
```python
class Handler(BaseHTTPRequestHandler):
    def do_GET(self):
        if self.path == "/stats":
            self._send(200, json.dumps(stats).encode())
            return

        target = STABLE if random.random() < 0.8 else CANARY
        key = "stable" if target == STABLE else "canary"

        stats[key] += 1

        try:
            r = requests.get(target, timeout=1)
            self._send(r.status_code, r.content)
        except Exception:
            self._send(500, b"error")

    def _send(self, code, body):
        self.send_response(code)
        self.send_header("Content-Type", "application/json")
        self.send_header("Content-Length", str(len(body)))
        self.end_headers()
        try:
            self.wfile.write(body)
        except:
            pass
```

---

## 6. Step c — Ambassador (Proxy) - Contd
```python
server = ThreadingHTTPServer(("0.0.0.0", 8080), Handler)
server.serve_forever()
```

---

## 7. Step 3 — Docker Compose

Create `docker-compose.yml`:

```yaml
services:
  backend:
    build: ./backend

  canary:
    build: ./canary

  ambassador:
    build: ./proxy
    ports:
      - "8080:8080"
```

---

## 8. Running the Ambassador Demo

Now run:

```bash
docker compose up --build
```

Then test:

```bash
curl http://localhost:8080
curl http://localhost:8080/stats
```

You should observe:

* responses from both services
* stats showing traffic split

# PART B — ADAPTER PATTERN

## 9. Conceptual Idea

The adapter changes **how a system looks from the outside**.

```
Legacy App → Adapter → Standard Interface
```

We will adapt a legacy app to expose **Prometheus metrics**.

---

## 10. What We Will Build

* Legacy service exposing `/stats` (JSON)
* Adapter exposing `/metrics` (Prometheus format)

---

## 11. Step 1 — Legacy App

```python
from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer
import json, random

stats = {"requests": 0, "errors": 0}

class Handler(BaseHTTPRequestHandler):
    def do_GET(self):
        stats["requests"] += 1

        if random.random() < 0.2:
            stats["errors"] += 1

        self.send_response(200)
        self.send_header("Content-Type", "application/json")
        self.end_headers()
        self.wfile.write(json.dumps(stats).encode())

server = ThreadingHTTPServer(("0.0.0.0", 9000), Handler)
server.serve_forever()
```

---

## 12. Step 2 — Adapter (Prometheus Exporter)

```python
from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer
import requests

TARGET = "http://legacy:9000"

class Handler(BaseHTTPRequestHandler):
    def do_GET(self):
        if self.path != "/metrics":
            self.send_response(404)
            self.end_headers()
            return

        r = requests.get(TARGET)
        data = r.json()

        output = f"""
# TYPE legacy_requests_total counter
legacy_requests_total {data['requests']}
# TYPE legacy_errors_total counter
legacy_errors_total {data['errors']}
"""

        self.send_response(200)
        self.send_header("Content-Type", "text/plain")
        self.end_headers()
        self.wfile.write(output.encode())

server = ThreadingHTTPServer(("0.0.0.0", 9100), Handler)
server.serve_forever()
```

---

## 13. Step 3 — Run Adapter Demo

```bash
docker compose up --build
```

Test:

```bash
curl http://localhost:9100/metrics
```

---

## 14. Add Prometheus

Add to `docker-compose.yml`:

```yaml
  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
```

Example config:

```yaml
global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "adapter"
    static_configs:
      - targets: ["adapter:9100"]
```

---

## 15. Demo Prometheus Queries

Now open Prometheus and run:

```promql
rate(legacy_requests_total[30s])
```

Then:

```promql
100 * rate(legacy_errors_total[30s]) / rate(legacy_requests_total[30s])
```

---

## 16. Generating Traffic

Run:

```bash
python loadgen.py
```

This creates live data so graphs move.

---

# 17. Key Takeaways

* Ambassador = controls communication
* Adapter = transforms interfaces
* We can extend systems without modifying them
* Observability can be added externally
